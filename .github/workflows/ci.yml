name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1
  SAM_CLI_TELEMETRY: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Run FFI tests
        run: cargo test -p xifty-ffi

  runtime-artifact:
    name: Runtime Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build runtime artifact
        run: |
          python3 tools/build-runtime-artifact.py \
            --output /tmp/xifty-runtime-linux-x64.tar.gz

      - name: Validate runtime artifact
        run: |
          python3 tools/validate-runtime-artifact.py \
            --artifact /tmp/xifty-runtime-linux-x64.tar.gz

  lambda-node-example:
    name: Lambda Node Example
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install example dependencies
        working-directory: examples/aws-sam-node
        run: npm ci

      - name: Prepare Lambda layer
        working-directory: examples/aws-sam-node
        run: npm run prepare:layer

      - name: Validate SAM template
        working-directory: examples/aws-sam-node
        run: npm run validate

      - name: Invoke fixture example locally
        working-directory: examples/aws-sam-node
        run: npm run invoke:fixture > /tmp/xifty-sam-fixture.json

      - name: Invoke GPS fixture locally
        working-directory: examples/aws-sam-node
        run: npm run invoke:gps > /tmp/xifty-sam-gps.json

      - name: Build Lambda layer zip
        working-directory: examples/aws-sam-node
        run: npm run build:layer:zip

      - name: Verify Lambda layer artifact exists
        run: test -f examples/aws-sam-node/layer/xifty-node-layer.zip

      - name: Build AWS SAM application
        working-directory: examples/aws-sam-node
        run: sam build --template-file template.yaml --build-dir .aws-sam/build
