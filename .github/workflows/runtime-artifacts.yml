name: Runtime Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload runtime assets to (for example v0.1.4)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: runtime-artifacts-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Runtime Artifact (${{ matrix.target }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runs_on: macos-14
          - target: linux-x64
            runs_on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build runtime artifact
        run: |
          mkdir -p dist
          python3 tools/build-runtime-artifact.py \
            --output "dist/xifty-runtime-${{ matrix.target }}-${{ github.event.release.tag_name || inputs.release_tag }}.tar.gz"

      - name: Validate runtime artifact
        run: |
          python3 tools/validate-runtime-artifact.py \
            --artifact "dist/xifty-runtime-${{ matrix.target }}-${{ github.event.release.tag_name || inputs.release_tag }}.tar.gz"

      - name: Upload runtime artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.release_tag }}" \
            "dist/xifty-runtime-${{ matrix.target }}-${{ github.event.release.tag_name || inputs.release_tag }}.tar.gz" \
            --repo XIFtySense/XIFty \
            --clobber
