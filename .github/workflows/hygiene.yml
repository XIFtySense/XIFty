name: Hygiene

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-contract:
    name: Docs And Contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Validate CAPABILITIES.json
        run: python3 -m json.tool CAPABILITIES.json > /dev/null

      - name: Validate CAPABILITIES.json against fixtures
        run: python3 tools/generate_capabilities.py --check

      - name: Validate schema artifacts
        run: |
          python3 -m json.tool schemas/xifty-probe-0.1.0.schema.json > /dev/null
          python3 -m json.tool schemas/xifty-analysis-0.1.0.schema.json > /dev/null

      - name: Install schema validation dependency
        run: python3 -m pip install --user jsonschema

      - name: Validate example outputs against checked-in schemas
        run: python3 tools/validate_schema_examples.py

      - name: Verify checked-in header matches generated output
        run: cargo test -p xifty-ffi checked_in_header_matches_generated_output -- --exact
        env:
          XIFTY_REQUIRE_CBINDGEN: "1"

  oracle-differentials:
    name: Oracle Differentials
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Run ExifTool-backed differential tests
        run: cargo test -p xifty-cli exiftool_differential_ -- --nocapture
        env:
          XIFTY_REQUIRE_EXIFTOOL: "1"
