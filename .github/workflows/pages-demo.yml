name: Demo Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-demo.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/xifty-cli/**"
      - "crates/xifty-core/**"
      - "crates/xifty-json/**"
      - "crates/xifty-source/**"
      - "crates/xifty-wasm/**"
      - "demo/**"
      - "fixtures/minimal/**"
      - "tools/build-web-demo.sh"

permissions:
  contents: read

concurrency:
  group: pages-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118

      - name: Build demo assets
        run: ./tools/build-web-demo.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./demo/web

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
